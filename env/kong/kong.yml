_format_version: "3.0"
_transform: true

services:
  - name: api_usuario_service
    host: host.docker.internal
    port: 5151
    protocol: http
    routes:
       - name: usuario_routes
         paths:
          -  /usuarios
         strip_path: true
       - name: login
         paths:
          - /login
         strip_path: true
  - name: api_rede_service
    host: host.docker.internal
    port: 5281
    protocol: http
    routes:
        - name: rede_routes
          paths:
            - /redes
          strip_path: true
plugins:
  - name: jwt
    route: usuario_routes

  - name: jwt
    route: rede_routes
jwt_secrets:
  - consumer: escola
    key: minha-chave
    secret: segredo-super-forte