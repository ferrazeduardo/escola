_format_version: "3.0"
_transform: true

services:
  - name: api_usuario_service
    host: usuarioapi
    port: 8080
    protocol: http
    routes:
      - name: usuario_routes
        paths:
          - /auth
        strip_path: true
        plugins:
          - name: jwt

      - name: login
        paths:
          - /login
        strip_path: false
        # sem JWT aqui — rota pública

  - name: api_rede_service
    host: redeapi
    port: 8080
    protocol: http
    routes:
      - name: rede_routes
        paths:
          - /redes
        strip_path: true
        plugins:
          - name: jwt
    
  - name: api_academico_service
    host: academicoapi
    port: 8080
    protocol: http
    routes:
      - name: academico_routes
        paths:
          - /academico
        strip_path: true
        plugins:
          - name: jwt

